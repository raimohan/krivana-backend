version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: krivana-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://krivana:${POSTGRES_PASSWORD}@postgres:5432/krivana_db
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
    volumes:
      - projects_data:/data/projects
      - uploads_data:/data/uploads
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - krivana_net

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: krivana-worker
    restart: unless-stopped
    command: node dist/worker.js
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://krivana:${POSTGRES_PASSWORD}@postgres:5432/krivana_db
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
    volumes:
      - projects_data:/data/projects
      - uploads_data:/data/uploads
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - krivana_net

  postgres:
    image: postgres:16-alpine
    container_name: krivana-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: krivana
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: krivana_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U krivana"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - krivana_net

  redis:
    image: redis:7-alpine
    container_name: krivana-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - krivana_net

  nginx:
    image: nginx:alpine
    container_name: krivana-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - api
    networks:
      - krivana_net

volumes:
  postgres_data:
  redis_data:
  projects_data:
  uploads_data:
  certbot_data:
  certbot_www:

networks:
  krivana_net:
    driver: bridge
