version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: krivana-api-dev
    command: pnpm dev
    env_file: .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://krivana:${POSTGRES_PASSWORD}@postgres:5432/krivana_db
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - projects_data:/data/projects
      - uploads_data:/data/uploads
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: krivana-worker-dev
    command: pnpm dev:worker
    env_file: .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://krivana:${POSTGRES_PASSWORD}@postgres:5432/krivana_db
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
    volumes:
      - .:/app
      - projects_data:/data/projects
      - uploads_data:/data/uploads
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: krivana
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: krivana_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  projects_data:
  uploads_data:
